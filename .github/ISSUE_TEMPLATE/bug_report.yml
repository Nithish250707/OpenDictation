name: 🐛 Bug Report
description: Something isn't working correctly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Pressed the shortcut, spoke, and then…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Settings → …
        2. Press ⌥Space
        3. …
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Open Dictation version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: >
        Output of
        `log show --last 10m --predicate 'subsystem == "org.opendictation.OpenDictation"'`
        if relevant. Never include your API key.
