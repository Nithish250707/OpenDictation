name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version && swift --version

      - name: Build
        run: >
          xcodebuild
          -project OpenDictation.xcodeproj
          -scheme OpenDictation
          -destination 'platform=macOS'
          build

      - name: Test
        run: >
          xcodebuild
          -project OpenDictation.xcodeproj
          -scheme OpenDictation
          -destination 'platform=macOS'
          test
